<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato/Swiggy Clone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-hamburger"></i> QuickBite
            </div>
            <div class="user-location" id="user-location-display" style="display: none;">
                <i class="fas fa-map-marker-alt"></i> <span id="display-location">New York</span>
            </div>
            <div class="nav-actions" id="nav-actions" style="display: none;">
                <div class="user-greeting">Hi, <span id="display-name">User</span></div>
                <div class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cart-count">0</span>
                </div>
            </div>
        </div>
    </header>

    <!-- App Container -->
    <main class="app-container">

        <!-- Step 1: User Info -->
        <section id="step-user-info" class="step-section active">
            <div class="login-container">
                <div class="login-header">
                    <h2>Welcome to QuickBite!</h2>
                    <p>Enter your details to find best food near you</p>
                </div>
                <form id="user-form" class="user-form">
                    <div class="form-group">
                        <label for="user-name">Full Name</label>
                        <input type="text" id="user-name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="user-email">Email Address</label>
                        <input type="email" id="user-email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="user-city">Location / City</label>
                        <div class="input-with-icon">
                            <i class="fas fa-location-arrow"></i>
                            <input type="text" id="user-city" placeholder="e.g. New York, Mumbai" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Continue <i
                            class="fas fa-arrow-right"></i></button>
                </form>
            </div>
        </section>

        <!-- Step 2: Restaurants List -->
        <section id="step-restaurants" class="step-section">
            <div class="container">
                <div class="section-header">
                    <h2>Top restaurants near you</h2>
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="restaurant-search" placeholder="Search for restaurant, cuisine...">
                    </div>
                </div>
                <div class="restaurants-grid" id="restaurants-container">
                    <!-- Restaurant Cards will go here -->
                </div>
            </div>
        </section>

        <!-- Step 3: Restaurant Menu -->
        <section id="step-menu" class="step-section">
            <div class="container">
                <button class="btn btn-back" id="back-to-restaurants">
                    <i class="fas fa-arrow-left"></i> Back to Restaurants
                </button>

                <div class="restaurant-header" id="current-restaurant-header">
                    <!-- Restaurant info goes here -->
                </div>

                <div class="menu-filters">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="Pizza">Pizza</button>
                    <button class="filter-btn" data-category="Burgers">Burgers</button>
                    <button class="filter-btn" data-category="Indian">Indian</button>
                    <button class="filter-btn" data-category="Chinese">Chinese</button>
                    <button class="filter-btn" data-category="Desserts">Desserts</button>
                    <button class="filter-btn" data-category="Drinks">Drinks</button>
                </div>

                <div class="menu-grid" id="menu-container">
                    <!-- Food items goes here -->
                </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
